<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GZ.DICT — My Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">GZ<span class="logo-dot">.</span>DICT</a>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="theme-icon">◐</span></button>
        <button class="btn-ghost" id="logoutBtn">LOG OUT</button>
      </div>
    </div>
  </header>

  <main class="profile-main">
    <div class="profile-hero">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <h1 class="profile-username" id="profileUsername">@username</h1>
        <p class="profile-email" id="profileEmail">email</p>
        <div class="profile-stars">
          <span class="star-icon">⭐</span>
          <span class="star-count" id="starCount">0</span>
          <span class="star-label">STARS EARNED</span>
        </div>
      </div>
    </div>

    <section class="upload-section">
      <div class="section-header">
        <p class="section-label">UPLOAD A SLANG</p>
      </div>
      <form class="upload-form" id="uploadForm">
        <div class="form-row">
          <div class="field">
            <label>SLANG WORD</label>
            <input type="text" id="slangWord" placeholder="e.g. rizz" required />
          </div>
        </div>
        <div class="field">
          <label>MEANING</label>
          <textarea id="slangMeaning" placeholder="what does it mean?" rows="2" required></textarea>
        </div>
        <div class="field">
          <label>EXAMPLE SENTENCE</label>
          <textarea id="slangExample" placeholder="use it in a sentence..." rows="2" required></textarea>
        </div>
        <div class="form-error" id="uploadError"></div>
        <div class="form-success" id="uploadSuccess"></div>
        <button type="submit" class="btn-primary">SUBMIT FOR REVIEW →</button>
      </form>
    </section>

    <section class="my-slangs-section">
      <div class="section-header">
        <p class="section-label">MY SUBMISSIONS</p>
      </div>
      <div class="slang-grid" id="mySlangGrid">
        <!-- injected by JS -->
      </div>
    </section>

  </main>

<script type="module" src="profile.js"></script>
</body>
</html>
